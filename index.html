<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conway Game of Life</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
        }
        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 0;
            background: #222;
        }
        .overlay {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div class="overlay">
        <!-- Place your website content here -->
    </div>
    <script>
        const canvas = document.getElementById('game');
        // Make canvas fill the viewport
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');
        let rows = Math.floor(canvas.height / 20);
        let cols = Math.floor(canvas.width / 20);
        let cellSize = Math.min(canvas.width / cols, canvas.height / rows);
        let grid = Array.from({length: rows}, () => Array(cols).fill(0));
        let running = true;
        let speed = 100; // ms
        let interval = null;

        let inverted = false;
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = inverted ? '#888' : '#888';
            ctx.lineWidth = 1;
            for (let i = 0; i <= rows; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(cols * cellSize, i * cellSize);
                ctx.stroke();
            }
            for (let j = 0; j <= cols; j++) {
                ctx.beginPath();
                ctx.moveTo(j * cellSize, 0);
                ctx.lineTo(j * cellSize, rows * cellSize);
                ctx.stroke();
            }
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (grid[i][j]) {
                        ctx.fillStyle = inverted ? '#000' : '#fff';
                    } else {
                        ctx.fillStyle = inverted ? '#fff' : '#000';
                    }
                    ctx.fillRect(j * cellSize + 1, i * cellSize + 1, cellSize - 2, cellSize - 2);
                }
            }
        }

        function nextGen() {
            const newGrid = Array.from({length: rows}, () => Array(cols).fill(0));
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    let neighbors = 0;
                    for (let di = -1; di <= 1; di++) {
                        for (let dj = -1; dj <= 1; dj++) {
                            if (di === 0 && dj === 0) continue;
                            let ni = i + di;
                            let nj = j + dj;
                            if (ni >= 0 && ni < rows && nj >= 0 && nj < cols) {
                                neighbors += grid[ni][nj];
                            }
                        }
                    }
                    if (grid[i][j]) {
                        newGrid[i][j] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
                    } else {
                        newGrid[i][j] = (neighbors === 3) ? 1 : 0;
                    }
                }
            }
            grid = newGrid;
            drawGrid();
        }

        function start() {
            if (!running) {
                running = true;
                interval = setInterval(nextGen, speed);
            }
        }
        function stop() {
            running = false;
            if (interval) clearInterval(interval);
        }
        function toggleRun() {
            if (running) {
                stop();
            } else {
                start();
            }
        }
        function changeSpeed(delta) {
            speed = Math.max(50, speed + delta);
            if (running) {
                stop();
                start();
            }
        }

        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const j = Math.floor(x / cellSize);
            const i = Math.floor(y / cellSize);
            if (i >= 0 && i < rows && j >= 0 && j < cols) {
                grid[i][j] = grid[i][j] ? 0 : 1;
                drawGrid();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'p' || e.key === 'P') {
                toggleRun();
            } else if (e.key === 'ArrowRight') {
                changeSpeed(-50);
            } else if (e.key === 'ArrowLeft') {
                changeSpeed(50);
            } else if (e.key === 'i' || e.key === 'I') {
                inverted = !inverted;
                drawGrid();
            }
        });

        // Fill grid with random cells for a lively background
        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                grid[i][j] = Math.random() > 0.7 ? 1 : 0;
            }
        }
        drawGrid();
        start();

        // Responsive canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            rows = Math.floor(canvas.height / 20);
            cols = Math.floor(canvas.width / 20);
            cellSize = Math.min(canvas.width / cols, canvas.height / rows);
            // Recreate grid with random cells
            grid = Array.from({length: rows}, () => Array(cols).fill(0));
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    grid[i][j] = Math.random() > 0.7 ? 1 : 0;
                }
            }
            drawGrid();
        });
    </script>
</body>
</html>
